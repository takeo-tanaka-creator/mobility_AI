name: Daily Data Collection & AI Analysis

on:
  schedule:
    - cron: '0 18 * * *' # JST 03:00
  workflow_dispatch:

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt が無いため最小構成でインストールします"
            pip install requests beautifulsoup4 pyyaml supabase openai anthropic google-generativeai python-dotenv
          fi

      - name: Collect inventory data from CarSensor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -f scripts/collect_inventory.py ]; then
            python scripts/collect_inventory.py
          elif [ -f carsensor_inventory_collector.py ]; then
            python carsensor_inventory_collector.py
          else
            echo "在庫取得スクリプトが見つかりません"
            exit 1
          fi

      - name: Collect weather data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -f scripts/collect_weather.py ]; then
            python scripts/collect_weather.py
          else
            echo "scripts/collect_weather.py が未作成のためスキップします"
          fi

      - name: Generate AI marketing insights
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LLM_MODEL: gpt-4o-mini
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -f scripts/generate_insights.py ]; then
            python scripts/generate_insights.py
          else
            echo "scripts/generate_insights.py が見つかりません"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: echo "❌ Daily pipeline failed at $(date -u)"
